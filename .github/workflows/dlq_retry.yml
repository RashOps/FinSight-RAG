name: DLQ Retry Pipeline

on:
  schedule:
    # Lance toutes les 3 heures (pour retenter les échecs plus fréquemment que l'ingestion principale)
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  retry-dlq:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      mongo_uri: ${{ secrets.MONGO_URI }}
      qdrant_url: ${{ secrets.QDRANT_URL }}
      qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}
      groq_api_key: ${{ secrets.GROQ_API_KEY }}
      cohere_api_key: ${{ secrets.COHERE_API_KEY }}
      scrape_do_api_key: ${{ secrets.SCRAPE_DO_API_KEY }}
      mongo_db_name: "finsight-db"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies with uv
        run: |
          uv sync --frozen

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run DLQ Retry Worker
        run: |
          uv run python -m src.ingestion.collector --dlq-only

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dlq-retry-logs
          path: logs/
          if-no-files-found: warn
