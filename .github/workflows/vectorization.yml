name: Data Vectorization Pipeline

on:
  workflow_run:
    workflows: ["Data Collection Pipeline"]
    types: [completed]
  workflow_dispatch:

jobs:
  vectorize-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # S'exécute toujours après le collector, qu'il réussisse ou échoue
    # Le vectorizer a ses propres protections pour gérer les cas où peu d'articles ont été scrapés

    env:
      qdrant_url: ${{ secrets.QDRANT_URL }}
      qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}
      groq_api_key: ${{ secrets.GROQ_API_KEY }}
      cohere_api_key: ${{ secrets.COHERE_API_KEY }}
      mongo_uri: ${{ secrets.MONGO_URI }}
      mongo_db_name: "finsight-db"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies with uv
        run: |
          uv sync --frozen

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run vectorizer
        run: |
          uv run python -m src.ingestion.vectorizer

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vectorization-logs
          path: logs/
          if-no-files-found: warn

      - name: Upload logs on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vectorization-logs
          path: logs/
          if-no-files-found: warn
